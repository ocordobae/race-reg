<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Perfil</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>

    <style>
      body {
        display: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
    </style>
  </head>

  <body data-page="protected" onload="loadCurrentName()">
    <div class="container mt-5" style="max-width: 400px">
      <h1 class="h5 mb-4">Editar Nombre</h1>

      <input id="nameInput" class="form-control" placeholder="Tu nombre" />
      <button class="btn btn-danger w-100 mt-3" onclick="saveName()">
        Guardar
      </button>

      <a href="index.html" class="btn btn-link w-100 mt-2">Cancelar</a>
    </div>

    <script>
      async function loadCurrentName() {
        const {
          data: { user },
        } = await supabaseClient.auth.getUser();

        const { data } = await supabaseClient
          .from("users")
          .select("name")
          .eq("email", user.email)
          .single();

        document.getElementById("nameInput").value = data.name;
      }

      async function saveName() {
        const newName = document.getElementById("nameInput").value.trim();

        if (newName.length < 2) {
          showToast("El nombre debe tener al menos 2 caracteres.", "danger");
          return;
        }

        const {
          data: { user },
        } = await supabaseClient.auth.getUser();

        const { error } = await supabaseClient
          .from("users")
          .update({ name: newName })
          .eq("email", user.email);

        if (error) {
          alert(error.message);
        } else {
          window.location.href = "index.html";
        }
      }
    </script>
  </body>
</html>
