<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Race Register</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <style>
      body {
        display: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .table-container {
        overflow-x: auto;
        max-height: 70vh;
      }

      table {
        font-size: 0.75rem;
      }

      th,
      td {
        white-space: nowrap;
      }

      thead th {
        position: sticky;
        top: 0;
        background: white;
        z-index: 2;
      }

      .avatar-badge {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(220, 53, 69, 0.12);
        color: #dc3545;
        font-weight: 700;
        font-size: 0.85rem;
        user-select: none;
      }
      .bi-pencil-square:hover {
        color: #dc3545;
        transform: scale(1.1);
        transition: 0.15s ease;
      }
    </style>
    <style>
      .cal-card {
        border: 1px solid rgba(108, 117, 125, 0.25);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }

      .cal-title {
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: #212529;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .cal-title .year {
        font-weight: 600;
        color: #6c757d;
        font-size: 0.8rem;
      }

      .cal-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 0.72rem;
      }

      .cal-table th,
      .cal-table td {
        text-align: center;
        padding: 3px 0;
        border-radius: 6px;
      }

      .cal-table th {
        color: #6c757d;
        font-weight: 700;
        font-size: 0.65rem;
      }

      .cal-table td.muted {
        color: rgba(108, 117, 125, 0.55);
      }

      .cal-table td.today {
        background: rgba(220, 53, 69, 0.12);
        color: #dc3545;
        font-weight: 800;
      }
      .cal-scroll {
        max-height: calc(
          100vh - 140px
        ); /* ajusta 140px a 120px si tu navbar es más alto */
        overflow-y: auto;
        padding-right: 6px; /* espacio para scrollbar */
      }
    </style>
  </head>

  <body data-page="protected">
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
          <span class="navbar-brand fw-bold mb-0">Race Register</span>
          <span
            id="adminBadge"
            class="text-warning d-none"
            title="Administrador"
          >
            <i class="bi bi-shield-lock-fill"></i>
          </span>
        </div>
        <button class="btn btn-light btn-sm" onclick="logout()">
          Cerrar sesión
        </button>
      </div>
    </nav>

    <div class="container mt-4">
      <h1 class="h4 d-flex align-items-center gap-2">
        <span id="avatar" class="avatar-badge">?</span>
        <span>
          Bienvenido,
          <span id="userName" class="fw-bold text-danger"></span>
        </span>
        <a
          href="edit_user.html"
          class="text-secondary"
          title="Editar perfil"
          aria-label="Editar perfil"
        >
          <i class="bi bi-pencil-square"></i>
        </a>
      </h1>
    </div>

    <div class="container-fluid mt-3">
      <div class="row g-3">
        <!-- Columna izquierda 20% -->
        <aside
          class="col-12 col-lg-3 col-xxl-2"
          style="flex: 0 0 20%; max-width: 20%"
        >
          <div class="cal-scroll">
            <div id="calendars" class="d-flex flex-column gap-3"></div>
          </div>
        </aside>

        <!-- Columna derecha 80% -->
        <section
          class="col-12 col-lg-9 col-xxl-10"
          style="flex: 0 0 80%; max-width: 80%"
        >
          <div class="border rounded-3 p-3 bg-white" style="min-height: 70vh">
            <!-- Por ahora en blanco -->
          </div>
        </section>
      </div>
    </div>
  </body>
  <script>
    function monthNameEs(date) {
      return new Intl.DateTimeFormat("es-CA", { month: "long" }).format(date);
    }

    function buildMonthCalendar(year, month, todayY, todayM, todayD) {
      // month: 0-11
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const daysInMonth = last.getDate();

      // Queremos semana empezando lunes (L M X J V S D)
      // JS getDay(): 0=Dom ... 6=Sáb
      const jsDay = first.getDay(); // 0..6
      const mondayIndex = (jsDay + 6) % 7; // 0=Lun .. 6=Dom

      const cal = document.createElement("div");
      cal.className = "cal-card";

      const title = document.createElement("div");
      title.className = "cal-title";
      const mName = monthNameEs(first);
      title.innerHTML = `<span style="text-transform:capitalize">${mName}</span><span class="year">${year}</span>`;
      cal.appendChild(title);

      const table = document.createElement("table");
      table.className = "cal-table";

      const thead = document.createElement("thead");
      thead.innerHTML = `
      <tr>
        <th>L</th><th>M</th><th>X</th><th>J</th><th>V</th><th>S</th><th>D</th>
      </tr>`;
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      let day = 1;
      for (let row = 0; row < 6; row++) {
        const tr = document.createElement("tr");

        for (let col = 0; col < 7; col++) {
          const td = document.createElement("td");

          // Celdas vacías antes del 1er día
          if (row === 0 && col < mondayIndex) {
            td.textContent = "";
            td.className = "muted";
          } else if (day > daysInMonth) {
            td.textContent = "";
            td.className = "muted";
          } else {
            td.textContent = String(day);

            // Resaltar hoy
            if (year === todayY && month === todayM && day === todayD) {
              td.classList.add("today");
            }

            day++;
          }

          tr.appendChild(td);
        }

        tbody.appendChild(tr);

        // Si ya terminamos los días del mes, salimos
        if (day > daysInMonth) break;
      }

      table.appendChild(tbody);
      cal.appendChild(table);

      return cal;
    }

    function renderNextCalendars(count = 14) {
      const container = document.getElementById("calendars");
      if (!container) return;

      container.innerHTML = "";

      const now = new Date();
      const todayY = now.getFullYear();
      const todayM = now.getMonth();
      const todayD = now.getDate();
      const startOffset = -2;
      for (let i = 0; i < count; i++) {
        const d = new Date(todayY, todayM + startOffset + i, 1);

        const cal = buildMonthCalendar(
          d.getFullYear(),
          d.getMonth(),
          todayY,
          todayM,
          todayD,
        );
        container.appendChild(cal);
      }
    }

    // Renderizar cuando la página esté visible (ya autenticada)
    document.addEventListener("DOMContentLoaded", () => {
      // Si tu auth oculta body hasta sesión, esto corre igual.
      renderNextCalendars(14);
    });
  </script>
</html>
