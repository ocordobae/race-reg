<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login - Race Reg</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-white" data-page="login">
    <div class="container" style="max-width: 400px">
      <h1 class="h4 mt-5 text-center">Iniciar sesión</h1>

      <input
        id="email"
        type="email"
        class="form-control mt-4"
        placeholder="Correo"
        autocomplete="email"
      />

      <button
        id="btnSend"
        class="btn btn-danger w-100 mt-3"
        onclick="sendOtp()"
      >
        Enviar código
      </button>

      <!-- Si luego vuelves a OTP manual, descomenta:
      <input id="code" class="form-control mt-4" placeholder="Código OTP" />
      <button class="btn btn-outline-secondary w-100 mt-3" onclick="verifyOtp()">Entrar</button>
      -->
    </div>

    <script>
      async function sendOtp() {
        const btn = document.getElementById("btnSend");
        btn.disabled = true;
        btn.textContent = "Enviando...";

        try {
          const email = document.getElementById("email").value.trim();
          if (!email) throw new Error("Escribe tu correo.");

          const { error } = await supabaseClient.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: window.location.origin },
          });

          if (error) throw error;

          alert("Código enviado, revisa tu correo (y spam).");
        } catch (e) {
          alert(e.message || "Error enviando OTP");
        } finally {
          // re-habilita con un pequeño delay para evitar spam de clicks
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = "Enviar código";
          }, 4000);
        }
      }
    </script>
  </body>
</html>
